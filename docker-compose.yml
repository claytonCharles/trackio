services:
  traefik:
    image: traefik:v3.6.8
    container_name: traefik
    restart: unless-stopped
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entryPoints.web.address=:80
    ports:
      - 80:80
      - 8080:8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - trackio

  web:
    build:
      context: ./
    container_name: trackio
    restart: unless-stopped
    ports:
      - ${REACT_PORT:-7000}:${REACT_PORT:-7000}
    volumes:
      - ./:/var/www
    depends_on:
      - postgres
    networks:
      - trackio

  nginx:
    image: nginx:stable-alpine
    container_name: trackio_nginx
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.trackio.rule=Host(`trackio.dev.com`)
      - traefik.http.routers.trackio.service=app-trackio-service
      - traefik.http.services.app-trackio-service.loadbalancer.server.port=80
    volumes:
      - ./:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
    networks:
      - trackio

  queue:
    build:
      context: ./
    container_name: trackio_queue
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600", "--no-interaction"]
    volumes:
      - ./:/var/www
    depends_on:
      - postgres
    networks:
      - trackio

  reverb:
    build:
      context: ./
    container_name: trackio_reverb
    restart: unless-stopped
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8081", "--no-interaction"]
    ports:
      - 8081:8081
    volumes:
      - ./:/var/www
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "php -r \"fsockopen('localhost', 8081);\" 2>/dev/null && echo ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - trackio

  postgres:
    image: postgres:18-alpine
    container_name: trackio_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - ${DB_PORT}:5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - trackio

volumes:
  pgdata:

networks:
  trackio: